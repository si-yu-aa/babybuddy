{% extends 'error/base.html' %}
{% load i18n %}
{% block title %}
    404 {% trans "页面未找到" %}
{% endblock %}
{% block content %}
    <h1>404 {% trans "页面未找到" %}</h1>
    <div>
        {% blocktrans trimmed with path="<code>"|add:request_path|add"</code>"|safe %}
        The path {{ path }} does not exist.
    {% endblocktrans %}
</div>
{% endblock %}
