services:
  babybuddy:
    build: .
    container_name: babybuddy
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./babybuddy:/app/babybuddy
      - ./social:/app/social
      - ./core:/app/core
      - ./api:/app/api
    environment:
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
      - REDIS_HOST=redis
      - ALLOWED_HOSTS=*
    depends_on:
      - redis
    restart: unless-stopped
    command: >
      sh -c "daphne -b 0.0.0.0 -p 8000 babybuddy.asgi:application"

  redis:
    image: redis:7-alpine
    container_name: babybuddy-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
